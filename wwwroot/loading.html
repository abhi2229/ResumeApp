<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Resume — Abhishek Maiti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #3a3a3a 0%, #5a5a5a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-container {
            text-align: center;
            color: white;
        }

        .loading-logo {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            animation: fadeInDown 0.8s ease-out;
            will-change: opacity, transform;
        }

        .loading-logo span {
            color: #d0d0d0;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 2rem;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #d0d0d0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-text {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            animation: fadeInDown 1s ease-out 0.2s both;
            font-weight: 500;
            will-change: opacity, transform;
        }

        .loading-subtext {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease-out 0.4s both;
            will-change: opacity, transform;
        }

        .loading-info {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.6;
            animation: fadeInDown 1s ease-out 0.6s both;
            will-change: opacity, transform;
        }

        .dot-animation {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #d0d0d0;
            margin: 0 4px;
            animation: bounce 1.4s infinite;
            will-change: transform;
        }

        .dot-animation:nth-child(1) { animation-delay: -0.32s; }
        .dot-animation:nth-child(2) { animation-delay: -0.16s; }
        .dot-animation:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .footer-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            font-size: 0.8rem;
            opacity: 0.7;
            animation: fadeInUp 1s ease-out 1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-logo">AM<span>.</span></div>
        <div class="spinner"></div>
        <div class="loading-text">Resume Loading</div>
        <div class="loading-subtext">
            <span class="dot-animation"></span>
            <span class="dot-animation"></span>
            <span class="dot-animation"></span>
        </div>
        <div class="loading-info">
            <p style="margin-bottom: 8px;">🚀 Initializing on Free Tier</p>
            <p>This may take up to 30 seconds on first load</p>
        </div>
    </div>

    <div class="footer-note">
        Free hosting takes time to spin up • Thanks for your patience! ✨
    </div>

    <script>
        function checkAppReady() {
            fetch('/', { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {
                    setTimeout(checkAppReady, 2000);
                });
        }

        setTimeout(checkAppReady, 1000);
    </script>
</body>
</html>
